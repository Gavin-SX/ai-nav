<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全部 AI 工具 · AI 导航</title>
  <meta name="description" content="探索 120 款精选 AI 工具，覆盖对话、图像、视频、编程、音频等全部分类。">
  <meta name="keywords" content="AI工具, AI导航, 人工智能工具, AI工具列表, ChatGPT, Midjourney, 全部工具">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://example.com/tools.html">
  <link rel="stylesheet" href="css/style.css?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
</head>
<body>
  <!-- Navbar (固定顶部，与首页一致) -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-logo">🤖 AI 导航</a>
      <button class="navbar-toggle" aria-label="切换菜单">☰</button>
      <div class="navbar-links">
        <a href="index.html">首页</a>
        <a href="tools.html">全部工具</a>
        <a href="index.html#categories">分类</a>
      </div>
    </div>
  </nav>

  <!-- 页面头部 -->
  <section class="page-header">
    <div class="page-header-content">
      <h1 class="page-header-title">全部 <span class="gradient-text">AI 工具</span></h1>
      <p class="page-header-desc">探索 120 款精选 AI 工具</p>
    </div>
  </section>

  <!-- 搜索和筛选区域 -->
  <section class="section">
    <div class="tool-list-layout">
      <!-- 左侧边栏：分类筛选 -->
      <aside class="tool-list-sidebar">
        <h3>分类筛选</h3>
        <div class="category-filter-list" data-render="category-filters">
          <!-- app.js 渲染分类按钮 -->
        </div>
      </aside>

      <!-- 右侧主区域 -->
      <div class="tool-list-main">
        <!-- 搜索栏 -->
        <div class="tool-list-toolbar">
          <input type="text" class="tool-search-input" data-render="tool-search" placeholder="搜索 AI 工具名称或描述...">
        </div>
        <!-- 工具列表网格 -->
        <div class="tool-grid" data-render="tool-list">
          <!-- app.js 渲染工具卡片 -->
        </div>
      </div>
    </div>
  </section>

  <!-- 页脚 (与首页一致) -->
  <footer class="footer">
    <div class="footer-content">
      <p>© 2026 AI 导航 · 发现最好用的 AI 工具</p>
    </div>
  </footer>

  <!-- 加载遮罩 -->
  <div class="loading-overlay" id="loading"><div class="loading-spinner"></div></div>

  <script src="js/app.js"></script>
</body>
</html>
